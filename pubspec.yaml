name: painel_ong
description: Painel Administrativo Desktop para ONG de doações.
publish_to: 'none'
environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  go_router: ^13.0.0
  provider: ^6.1.0
  get_it: ^7.6.7
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  mask_text_input_formatter: ^2.9.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.4
  window_manager: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
